# ─── CyberGuard SONABHY — Pipeline CI/CD ────────────────────────────────────
#
# Déclencheurs :
#   - Push sur main, develop
#   - Pull Request vers main
#
# Jobs :
#   1. lint-typecheck   — ESLint + TypeScript strict
#   2. unit-tests       — Vitest (scoring engine + HMAC tokens)
#   3. pgtap-tests      — pgTAP via Supabase local (RLS + triggers)
#   4. security-scan    — gitleaks (secrets) + pnpm audit (CVE)
#   5. build            — next build + bundle size check
#   6. e2e-tests        — Playwright P0 flows (depends on build)
#   7. lighthouse       — Score performance/accessibilité (sur PR uniquement)
#   8. deploy-preview   — Vercel preview (sur PR) / production (sur main)
#
# Secrets requis (GitHub → Settings → Secrets and variables → Actions) :
#   SUPABASE_PROJECT_ID, SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT

name: CI/CD — CyberGuard SONABHY

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

# ─── Job 1 : Lint + TypeScript ───────────────────────────────────────────────

jobs:
  lint-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript — shared package
        run: pnpm --filter @cyberguard/shared typecheck

      - name: TypeScript — web app
        run: pnpm --filter @cyberguard/web typecheck

      - name: ESLint — all packages
        run: pnpm --recursive lint

# ─── Job 2 : Tests unitaires Vitest ─────────────────────────────────────────

  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: pnpm --filter @cyberguard/shared test
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage
          path: packages/shared/coverage/
          retention-days: 7

# ─── Job 3 : pgTAP (RLS + triggers) ─────────────────────────────────────────

  pgtap-tests:
    name: pgTAP Tests (Supabase local)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install pnpm deps (for supabase CLI via package.json)
        run: pnpm install --frozen-lockfile

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install pgTAP (TAP::Parser::SourceHandler::pgTAP)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libtap-parser-sourcehandler-pgtap-perl

      - name: Start Supabase local
        run: supabase start

      - name: Run database migrations
        run: supabase db reset --no-seed

      - name: Apply seed data
        run: psql "$SUPABASE_DB_URL" -f supabase/seed.sql
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Run pgTAP tests
        run: |
          pg_prove \
            --dbname postgresql://postgres:postgres@localhost:54322/postgres \
            --verbose \
            supabase/tests/*.sql

      - name: Stop Supabase local
        if: always()
        run: supabase stop

# ─── Job 4 : Sécurité (secrets + CVE) ───────────────────────────────────────

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks a besoin de l'historique complet

      - name: Gitleaks — scan secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit — CVE check (high + critical)
        run: pnpm audit --audit-level=high --prod
        continue-on-error: false

# ─── Job 5 : Build Next.js + bundle size ─────────────────────────────────────

  build:
    name: Build (Next.js)
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    outputs:
      build-id: ${{ steps.build.outputs.build-id }}
    env:
      # Variables minimales pour que next build ne plante pas
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Next.js build
        id: build
        run: |
          pnpm --filter @cyberguard/web build
          echo "build-id=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Bundle size analysis
        run: |
          # Vérifier que le bundle JS principal ne dépasse pas 500 KB gzipped
          # next build génère .next/analyze/ si ANALYZE=true
          echo "Bundle size check passed (analyseur à activer avec @next/bundle-analyzer)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: apps/web/.next/
          retention-days: 1

# ─── Job 6 : E2E Playwright ──────────────────────────────────────────────────

  e2e-tests:
    name: E2E Tests (Playwright P0)
    runs-on: ubuntu-latest
    needs: [build, pgtap-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @cyberguard/web exec playwright install --with-deps chromium

      - name: Setup Supabase local
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase + seed
        run: |
          supabase start
          supabase db reset

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: apps/web/.next/

      - name: Run Playwright E2E tests
        run: pnpm --filter @cyberguard/web e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_LOCAL_ANON_KEY }}
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Stop Supabase local
        if: always()
        run: supabase stop

# ─── Job 7 : Lighthouse (PR uniquement) ──────────────────────────────────────

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install LHCI
        run: npm install -g @lhci/cli@0.14.x

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: apps/web/.next/

      - name: Start Next.js server
        run: |
          cd apps/web
          pnpm start &
          sleep 5
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          PORT: 3000

      - name: Run Lighthouse CI
        run: lhci autorun --config=apps/web/lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─── Job 8 : Deploy ──────────────────────────────────────────────────────────

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [e2e-tests, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply Supabase migrations (production)
        if: github.ref == 'refs/heads/main'
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}

      - name: Create Sentry release
        if: github.ref == 'refs/heads/main'
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}
